artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small Apache-style access log and emit summary stats: total request count, unique client IPs, and the most-requested path."
solution_explanation = "Read the log line by line, count total lines, collect unique IPs from the first field, extract request paths via regex, and count path frequency to find the top path."
verification_explanation = "The verifier parses /app/report.json and asserts exact values for total_requests, unique_ips, and top_path against the known access.log fixture."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
